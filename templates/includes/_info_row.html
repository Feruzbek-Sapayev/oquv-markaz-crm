<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 22px;border-bottom:1px solid var(--border-subtle);">
    <div
        style="width:32px;height:32px;background:rgba(99,102,241,0.08);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <i class="fas {{ icon }}" style="color:var(--primary);font-size:12px;"></i>
    </div>
    <div>
        <div style="font-size:11px;color:var(--text-muted);font-weight:500;">{{ label }}</div>
        <div style="font-size:13px;font-weight:600;color:var(--dark);margin-top:1px;">{{ value }}</div>
    </div>
</div>
